<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESG Group — Emissions insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --green:#1f9d6f; --green-dim:#e3f4ec; --green-dark:#157a56;
  --s1:#d9822b; --s1-dim:#fcf0e2;
  --s2:#2b7fd9; --s2-dim:#e6f0fc;
  --s3:#c23b6e; --s3-dim:#fbe6ee;
  --bg:#f7f9f8; --surface:#fff; --border:#e3e8e5; --border2:#f1f4f2;
  --text:#14181a; --text2:#5b655f; --text3:#8a9590;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;}
.wrap{max-width:1040px; margin:0 auto; padding:24px 32px 80px;}
a{color:inherit;}

.topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
.brand{display:flex; align-items:center; gap:12px;}
.brand .logo{width:36px; height:36px; border-radius:9px; background:var(--green); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:17px;}
.brand .name{font-size:17px; font-weight:700;}
.brand .sub{font-size:11px; color:var(--text3);}
.user-chip{display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--border); border-radius:30px; padding:6px 16px 6px 6px;}
.user-chip .avatar{width:28px; height:28px; border-radius:50%; background:var(--green-dim); color:var(--green); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;}
.user-chip .role{font-size:12px; color:var(--text3);}

.controls-bar{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.period-selector{display:flex; gap:4px; background:#fff; border:1px solid var(--border); border-radius:10px; padding:4px;}
.period-tab{font-size:12.5px; padding:7px 13px; border-radius:7px; cursor:pointer; color:var(--text2); white-space:nowrap;}
.period-tab.active{background:var(--green); color:#fff; font-weight:600;}
.month-row{display:flex; gap:4px; flex-wrap:wrap; margin-top:6px;}
.month-tab{font-size:11px; padding:5px 9px; border-radius:6px; cursor:pointer; color:var(--text3); border:1px solid var(--border); background:#fff;}
.month-tab.active{background:var(--green-dim); color:var(--green); border-color:var(--green); font-weight:600;}

.breadcrumb{font-size:12px; margin-bottom:10px;}
.breadcrumb .crumb{color:var(--green); cursor:pointer; font-weight:500;}
.breadcrumb .crumb:hover{text-decoration:underline;}
.breadcrumb .sep{color:#c5cdc8; margin:0 6px;}
.breadcrumb .current{color:var(--text2);}

h1{font-size:24px; font-weight:700; margin-bottom:4px;}
.subtitle{font-size:13px; color:var(--text2); margin-bottom:20px;}
.blurb{font-size:13px; color:var(--text2); background:var(--green-dim); border-radius:10px; padding:12px 16px; margin-bottom:20px; line-height:1.55;}
.blurb b{color:var(--text);}

.card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px 28px; margin-bottom:18px; box-shadow:0 1px 2px rgba(20,24,26,0.03);}
.grid-2{display:grid; grid-template-columns:1.3fr 1fr; gap:18px; margin-bottom:18px;}
.grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}

.hero-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
.hero-label{font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;}
.hero-total{font-size:36px; font-weight:700; letter-spacing:-0.01em;}
.hero-total span{font-size:14px; font-weight:400; color:var(--text2); margin-left:6px;}
.hero-meta{font-size:12px; color:var(--text3); margin-top:6px;}

.scope-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
.scope-card{background:var(--bg); border-radius:11px; padding:15px 17px; border-top:3px solid;}
.scope-card.s1{border-color:var(--s1);} .scope-card.s2{border-color:var(--s2);} .scope-card.s3{border-color:var(--s3);} .scope-card.total{border-color:var(--green);}
.scope-card .label{font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:7px; display:flex; align-items:center; gap:6px;}
.scope-card .dot{width:7px; height:7px; border-radius:50%; display:inline-block;}
.scope-card .value{font-size:19px; font-weight:700;}
.scope-card .value span{font-size:11px; font-weight:400; color:var(--text2);}
.scope-card .pct{font-size:10.5px; color:var(--text3); margin-top:3px;}

.section-title{font-size:14px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.section-title .count{font-size:11px; color:var(--text3); font-weight:400;}

table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text3); padding:9px 12px; border-bottom:1px solid var(--border2); font-weight:600;}
thead th.num{text-align:right;}
tbody td{padding:12px; border-bottom:1px solid var(--border2); vertical-align:middle;}
tbody td.num{text-align:right; font-variant-numeric:tabular-nums; font-weight:700;}
tbody tr:hover{background:#fafcfb; cursor:pointer;}
tbody tr:last-child td{border-bottom:none;}
.entity-name{font-weight:700; display:flex; align-items:center; gap:8px;}
.entity-name .dot{width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; flex-shrink:0;}
.rank-badge{display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:5px; background:var(--green-dim); color:var(--green); font-size:11px; font-weight:700;}

.link-btn{display:inline-flex; align-items:center; gap:5px; background:transparent; border:1px solid #d3dbd6; color:var(--text2); font-size:11.5px; font-weight:600; padding:6px 11px; border-radius:6px;}
tbody tr:hover .link-btn{border-color:var(--green); color:var(--green); background:var(--green-dim);}

.cat-bars{display:flex; flex-direction:column; gap:9px;}
.cat-row{display:grid; grid-template-columns:140px 1fr 64px; align-items:center; gap:10px; font-size:12.5px;}
.cat-name{color:var(--text2);}
.cat-track{height:7px; background:var(--bg); border-radius:4px; overflow:hidden;}
.cat-fill{height:100%; border-radius:4px; background:var(--green);}
.cat-val{text-align:right; font-weight:700;}

.legend{display:flex; gap:16px; font-size:11.5px; color:var(--text2); margin-bottom:14px;}
.legend span{display:flex; align-items:center; gap:5px;}
.legend .dot{width:8px; height:8px; border-radius:50%;}

.chart-svg{width:100%; height:auto; display:block;}
.trend-label{font-size:10px; fill:var(--text3); font-family:-apple-system,sans-serif;}
.donut-seg{cursor:pointer; transition:opacity .15s;}
.donut-seg:hover{opacity:0.75;}
.trend-bar{cursor:pointer; transition:opacity .15s;}
.trend-hit-area{cursor:pointer;}
.trend-bar-group:hover .trend-bar{opacity:1; filter:brightness(1.08);}
.cat-row.has-tt{cursor:pointer; border-radius:6px; transition:background .12s;}
.cat-row.has-tt:hover{background:var(--bg);}

.back-link{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--text2); margin-bottom:14px; cursor:pointer;}
.back-link:hover{color:var(--green);}

.total-row td{font-weight:700; background:var(--green-dim);}
.total-row .entity-name{color:var(--green);}

.detail-stat-row{display:flex; gap:24px; margin-bottom:18px; flex-wrap:wrap;}
.detail-stat{font-size:11.5px; color:var(--text3);}
.detail-stat b{display:block; font-size:18px; color:var(--text); font-weight:700; margin-top:2px;}

.empty-state{font-size:13px; color:var(--text3); padding:20px; text-align:center;}

/* Custom cursor-following tooltip, replaces native SVG <title> tooltips
   which are slow to appear and hard to read. */
#custom-tooltip{
  position:fixed; pointer-events:none; z-index:999; display:none;
  background:#14181a; color:#fff; font-size:12.5px; line-height:1.5;
  padding:9px 13px; border-radius:8px; max-width:280px;
  box-shadow:0 6px 18px rgba(0,0,0,0.22); white-space:pre-line;
}
#custom-tooltip b{font-weight:700;}
</style>
</head>
<body>
<div id="custom-tooltip"></div>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo">E</div>
      <div>
        <div class="name">ESG Group</div>
        <div class="sub">Carbon insights &middot; Group sustainability view</div>
      </div>
    </div>
    <div class="user-chip">
      <div class="avatar">RA</div>
      <div>
        <div style="font-size:13px;font-weight:700;color:#14181a">Rashid Al Mansoori</div>
        <div class="role">Group Sustainability Director</div>
      </div>
    </div>
  </div>

  <div class="controls-bar">
    <div>
      <div class="period-selector" id="period-selector"></div>
      <div class="month-row" id="month-row"></div>
    </div>
  </div>

  <div id="app"></div>
</div>

<script>
const ALL_PERIODS = JSON.parse(document.getElementById('data-blob').textContent);
const PERIOD_GROUPS = [
  {key:'year', label:'Year'},
  {key:'h1', label:'H1'}, {key:'h2', label:'H2'},
  {key:'q1', label:'Q1'}, {key:'q2', label:'Q2'}, {key:'q3', label:'Q3'}, {key:'q4', label:'Q4'},
  {key:'month', label:'Month'},
];
const MONTH_KEYS = Object.keys(ALL_PERIODS).filter(k => /^\d{4}-\d{2}$/.test(k));

let state = { period: 'year', monthKey: MONTH_KEYS[0], route: ['group'] };

function fmt(n){ return Number(n).toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1}); }
function currentData(){
  if (state.period === 'month') return ALL_PERIODS[state.monthKey];
  return ALL_PERIODS[state.period];
}
function currentPeriodLabel(){
  if (state.period === 'month') return ALL_PERIODS[state.monthKey].period_label;
  return ALL_PERIODS[state.period].period_label;
}

function renderPeriodSelector(){
  const sel = document.getElementById('period-selector');
  sel.innerHTML = PERIOD_GROUPS.map(p =>
    `<div class="period-tab ${state.period===p.key?'active':''}" onclick="setPeriod('${p.key}')">${p.label}</div>`
  ).join('');
  const monthRow = document.getElementById('month-row');
  if (state.period === 'month'){
    monthRow.innerHTML = MONTH_KEYS.map(mk =>
      `<div class="month-tab ${state.monthKey===mk?'active':''}" onclick="setMonth('${mk}')">${ALL_PERIODS[mk].period_label}</div>`
    ).join('');
  } else {
    monthRow.innerHTML = '';
  }
}
function setPeriod(p){ state.period = p; if(p==='month' && !state.monthKey) state.monthKey = MONTH_KEYS[0]; renderPeriodSelector(); render(); }
function setMonth(mk){ state.monthKey = mk; renderPeriodSelector(); render(); }

function navTo(route){ state.route = route; window.scrollTo(0,0); render(); }

function scopeGrid(s1,s2,s3,total){
  const pct = v => total>0 ? ((v/total)*100).toFixed(1) : '0.0';
  return `<div class="scope-grid">
    <div class="scope-card s1"><div class="label"><span class="dot" style="background:var(--s1)"></span>Scope 1</div>
      <div class="value">${fmt(s1)} <span>t</span></div><div class="pct">${pct(s1)}% of total</div></div>
    <div class="scope-card s2"><div class="label"><span class="dot" style="background:var(--s2)"></span>Scope 2</div>
      <div class="value">${fmt(s2)} <span>t</span></div><div class="pct">${pct(s2)}% of total</div></div>
    <div class="scope-card s3"><div class="label"><span class="dot" style="background:var(--s3)"></span>Scope 3</div>
      <div class="value">${fmt(s3)} <span>t</span></div><div class="pct">${pct(s3)}% of total</div></div>
    <div class="scope-card total"><div class="label">Total</div>
      <div class="value">${fmt(total)} <span>t</span></div><div class="pct">100% combined</div></div>
  </div>`;
}

function escAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function topCategories(catTotals, n){
  n = n || 5;
  const entries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,n);
  if (entries.length === 0) return '<div class="empty-state">No category data for this period.</div>';
  const max = entries[0][1] || 1;
  const sumAll = Object.values(catTotals).reduce((s,v)=>s+v,0);
  return '<div class="cat-bars">' + entries.map(([name,val]) => {
    const pct = sumAll>0 ? (val/sumAll*100).toFixed(1) : '0.0';
    const tt = `<b>${name}</b>\n${fmt(val)} t CO2e &middot; ${pct}% of categorized total`;
    return `<div class="cat-row has-tt" data-tt="${escAttr(tt)}"><div class="cat-name">${name}</div>
      <div class="cat-track"><div class="cat-fill" style="width:${(val/max*100).toFixed(1)}%"></div></div>
      <div class="cat-val">${fmt(val)} t</div></div>`;
  }).join('') + '</div>';
}

// Donut chart (pure SVG, no external library)
function scopeDonut(s1, s2, s3){
  const total = s1+s2+s3;
  if (total <= 0) return '<div class="empty-state">No data</div>';
  const r = 52, cx = 70, cy = 70, circ = 2*Math.PI*r;
  const segs = [
    {v:s1, color:'var(--s1)', label:'Scope 1'},
    {v:s2, color:'var(--s2)', label:'Scope 2'},
    {v:s3, color:'var(--s3)', label:'Scope 3'}
  ];
  let offset = 0;
  const paths = segs.map(seg => {
    const frac = seg.v/total;
    const len = frac*circ;
    const dash = `${len} ${circ-len}`;
    const rotate = (offset/circ)*360 - 90;
    offset += len;
    const pct = (frac*100).toFixed(1);
    const tt = `<b>${seg.label}</b>\n${fmt(seg.v)} t CO2e &middot; ${pct}% of total`;
    return `<circle class="donut-seg has-tt" data-tt="${escAttr(tt)}" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="20"
      stroke-dasharray="${dash}" transform="rotate(${rotate} ${cx} ${cy})"/>`;
  }).join('');
  return `<svg class="chart-svg" viewBox="0 0 140 140" style="max-width:160px;margin:0 auto;display:block">
    ${paths}
    <text x="70" y="66" text-anchor="middle" font-size="15" font-weight="700" fill="var(--text)">${fmt(total)}</text>
    <text x="70" y="80" text-anchor="middle" font-size="9" fill="var(--text3)">t CO2e</text>
  </svg>`;
}

// Monthly trend bar chart for an entity (uses raw monthly data, not aggregated period)
function trendChart(ename){
  const months = MONTH_KEYS.map(mk => ALL_PERIODS[mk].entities[ename]);
  const max = Math.max(...months.map(m => m.total), 0.1);
  const w = 560, h = 140, barW = w/months.length - 6;
  let bars = '';
  months.forEach((m, i) => {
    const bh = (m.total/max) * 100;
    const x = i * (w/months.length) + 3;
    const monthLabel = ALL_PERIODS[MONTH_KEYS[i]].period_label;
    const tt = `<b>${monthLabel}</b>\n${fmt(m.total)} t CO2e total\nScope 1: ${fmt(m.scope1)} t &middot; Scope 2: ${fmt(m.scope2)} t &middot; Scope 3: ${fmt(m.scope3)} t`;
    bars += `<g class="trend-bar-group">
      <rect x="${x}" y="${110-bh}" width="${barW}" height="${bh}" fill="var(--green)" rx="2" opacity="0.85" class="trend-bar"/>
      <rect x="${x}" y="0" width="${barW}" height="110" fill="transparent" class="trend-hit-area has-tt" data-tt="${escAttr(tt)}"/>
    </g>`;
    if (i % 2 === 0) bars += `<text x="${x+barW/2}" y="128" text-anchor="middle" class="trend-label">${monthLabel.split(' ')[0]}</text>`;
  });
  return `<svg class="chart-svg" viewBox="0 0 ${w} 138">${bars}</svg>`;
}

function blurbBox(text){
  return `<div class="blurb">${text}</div>`;
}

    <h1>Emissions overview</h1>
    <div class="subtitle">${currentPeriodLabel()} &middot; all figures in tonnes CO<sub>2</sub>e</div>
    ${blurbBox(g.blurb)}

    <div class="grid-2">
      <div class="card">
        <div class="hero-top">
          <div>
            <div class="hero-label">ESG Group total emissions</div>
            <div class="hero-total">${fmt(g.total)} <span>t CO2e</span></div>

      </div>
    </div>

    <div class="card">
      <div class="section-title">Top 5 emission categories <span class="count">across all entities, ${currentPeriodLabel()}</span></div>
      ${topCategories(g.category_totals)}
    </div>

    <div class="section-title" style="font-size:16px;margin:26px 0 12px;">Entity ranking</div>
    <div class="legend">
      <span><span class="dot" style="background:var(--s1)"></span>Scope 1</span>
      <span><span class="dot" style="background:var(--s2)"></span>Scope 2</span>
      <span><span class="dot" style="background:var(--s3)"></span>Scope 3</span>
    </div>
    <div class="card" style="padding:0">
      <table>
        <thead><tr><th>Rank</th><th>Entity</th><th class="num">Scope 1</th><th class="num">Scope 2</th><th class="num">Scope 3</th><th class="num">Total</th><th></th></tr></thead>

      <td><div class="entity-name"><span class="dot"></span>${ename}</div></td>
      <td class="num">${fmt(e.scope1)}</td><td class="num">${fmt(e.scope2)}</td><td class="num">${fmt(e.scope3)}</td>

  return html;
}

// =====================================================================
// ROUTE: ENTITY VIEW
// =====================================================================
function renderEntityView(ename){
  const d = currentData();
  const e = d.entities[ename];
  if (!e) return `<div class="empty-state">Entity not found for this period.</div>`;

  const deptRanked = [...e.departments].sort((a,b)=>b.total-a.total);
  const supRanked = [...e.suppliers].sort((a,b)=>b.total-a.total);

  let html = `
    <div class="breadcrumb"><span class="crumb" onclick="navTo(['group'])">ESG Group</span><span class="sep">/</span><span class="current">${ename}</span></div>
    <h1>${ename}</h1>
    <div class="subtitle">${currentPeriodLabel()} &middot; all figures in tonnes CO<sub>2</sub>e</div>
    ${blurbBox(e.blurb)}

    <div class="grid-2">
      <div class="card">
        <div class="hero-top">
          <div>
            <div class="hero-label">${ename} total emissions</div>
            <div class="hero-total">${fmt(e.total)} <span>t CO2e</span></div>
            <div class="hero-meta">${e.departments.length} departments &middot; ${e.suppliers.length} suppliers</div>
          </div>
        </div>
        ${scopeGrid(e.scope1, e.scope2, e.scope3, e.total)}
      </div>
      <div class="card">
        <div class="section-title">Monthly trend <span class="count">FY 2025-26</span></div>
        ${trendChart(ename)}
      </div>
    </div>

    <div class="card">
      <div class="section-title">Top emission categories <span class="count">for ${ename}, ${currentPeriodLabel()}</span></div>
      ${topCategories(e.category_totals)}
    </div>

    <div class="section-title" style="font-size:16px;margin:26px 0 12px;">Departments &middot; scope 1 &amp; 2</div>
    <div class="card" style="padding:0">
      <table>
        <thead><tr><th>Rank</th><th>Department</th><th class="num">Scope 1</th><th class="num">Scope 2</th><th class="num">Scope 3</th><th class="num">Total</th><th></th></tr></thead>
        <tbody>`;
  deptRanked.forEach((dep, i) => {
    html += `<tr onclick="navTo(['department','${ename}','${dep.name}'])">
      <td><span class="rank-badge">${i+1}</span></td>
      <td><div class="entity-name"><span class="dot"></span>${dep.name}</div></td>
      <td class="num">${fmt(dep.scope1)}</td><td class="num">${fmt(dep.scope2)}</td><td class="num">${fmt(dep.scope3)}</td>
      <td class="num">${fmt(dep.total)}</td><td><span class="link-btn">View &rarr;</span></td>
    </tr>`;
  });
  const deptTotal = e.departments.reduce((s,d)=>s+d.total,0);
  const deptS1 = e.departments.reduce((s,d)=>s+d.scope1,0), deptS2 = e.departments.reduce((s,d)=>s+d.scope2,0), deptS3 = e.departments.reduce((s,d)=>s+d.scope3,0);
  html += `<tr class="total-row"><td></td><td><div class="entity-name">Department subtotal</div></td>
    <td class="num">${fmt(deptS1)}</td><td class="num">${fmt(deptS2)}</td><td class="num">${fmt(deptS3)}</td><td class="num">${fmt(deptTotal)}</td><td></td></tr>`;
  html += `</tbody></table></div>`;

  html += `
    <div class="section-title" style="font-size:16px;margin:26px 0 12px;">Suppliers &middot; scope 3</div>
    <div class="card" style="padding:0">
      <table>
        <thead><tr><th>Rank</th><th>Supplier</th><th class="num">Purchased goods</th><th class="num">Transport</th><th class="num">Total</th><th></th></tr></thead>
        <tbody>`;
  supRanked.forEach((s, i) => {
    html += `<tr onclick="navTo(['supplier','${ename}','${s.name}'])">
      <td><span class="rank-badge">${i+1}</span></td>
      <td><div class="entity-name"><span class="dot"></span>${s.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${s.material} &middot; ${fmt(s.qty_tonnes)} t purchased</div></td>
      <td class="num">${fmt(s.purchased_goods_emission)}</td><td class="num">${fmt(s.transport_emission)}</td>
      <td class="num">${fmt(s.total)}</td><td><span class="link-btn">View &rarr;</span></td>
    </tr>`;
  });
  const supTotal = e.suppliers.reduce((s,x)=>s+x.total,0);
  html += `<tr class="total-row"><td></td><td><div class="entity-name">Supplier subtotal</div></td>
    <td class="num"></td><td class="num"></td><td class="num">${fmt(supTotal)}</td><td></td></tr>`;
  html += `</tbody></table></div>`;

  return html;
}

function render(){
  const [view, ...args] = state.route;
  const app = document.getElementById('app');
  if (view === 'group') app.innerHTML = renderGroupView();
  else if (view === 'entity') app.innerHTML = renderEntityView(args[0]);
  else if (view === 'department') app.innerHTML = renderDepartmentView(args[0], args[1]);
  else if (view === 'supplier') app.innerHTML = renderSupplierView(args[0], args[1]);
}

renderPeriodSelector();
render();

// Custom tooltip controller — event delegation on document so it keeps
// working after app.innerHTML is replaced on every navigation/render.
const tooltipEl = document.getElementById('custom-tooltip');
document.addEventListener('mouseover', (e) => {
  const target = e.target.closest('.has-tt');
  if (!target) return;
  tooltipEl.innerHTML = target.getAttribute('data-tt');
  tooltipEl.style.display = 'block';
});
document.addEventListener('mousemove', (e) => {
  if (tooltipEl.style.display !== 'block') return;
  const offset = 14;
  let left = e.clientX + offset;
  let top = e.clientY + offset;
  // Keep tooltip on-screen near right/bottom edges
  const ttRect = tooltipEl.getBoundingClientRect();
  if (left + ttRect.width > window.innerWidth - 10) left = e.clientX - ttRect.width - offset;
  if (top + ttRect.height > window.innerHeight - 10) top = e.clientY - ttRect.height - offset;
  tooltipEl.style.left = left + 'px';
  tooltipEl.style.top = top + 'px';
});
document.addEventListener('mouseout', (e) => {
  const target = e.target.closest('.has-tt');
  if (!target) return;
  // Only hide if we're not moving to a child of the same tooltip target
  if (target.contains(e.relatedTarget)) return;
  tooltipEl.style.display = 'none';
});

// If arriving from welcome.html with a #scope / #entities / #suppliers
// fragment, scroll to the relevant section after the initial render.
window.addEventListener('load', () => {
  const hash = window.location.hash.replace('#', '');
  if (!hash) return;
  setTimeout(() => {
    if (hash === 'scope') {
      document.querySelector('.scope-grid')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (hash === 'entities') {
      document.querySelector('table')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else if (hash === 'suppliers') {
      // Suppliers live inside an entity view; jump straight to the
      // highest-emitting entity's page so there's something to scroll to.
      const d = currentData();
      const topEntity = Object.entries(d.entities).sort((a,b)=>b[1].total-a[1].total)[0];
      if (topEntity) navTo(['entity', topEntity[0]]);
    }
  }, 50);
});
</script>
